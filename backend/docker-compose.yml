version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: augmentor
      POSTGRES_PASSWORD: augmentor
      POSTGRES_DB: augmentor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./storage:/app/storage
    depends_on:
      - db

volumes:
  pgdata:
