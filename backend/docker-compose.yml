services:
  db:
    image: postgres:16
    container_name: augmentor_postgres
    restart: always
    environment:
      POSTGRES_USER: augmentor_user
      POSTGRES_PASSWORD: augmentor_password
      POSTGRES_DB: augmentor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: augmentor_backend
    restart: always
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://augmentor_user:augmentor_password@db:5432/augmentor_db
    depends_on:
      - db

volumes:
  postgres_data: