version: "3.9"

services:
  db:
    image: postgres:16
    container_name: augmentor_postgres
    restart: always
    environment:
      POSTGRES_USER: augmentor_user
      POSTGRES_PASSWORD: augmentor_password
      POSTGRES_DB: augmentor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: